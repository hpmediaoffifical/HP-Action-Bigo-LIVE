<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 48">
  <defs>
    <linearGradient id="pkBody" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#37d5ff"/>
      <stop offset="0.48" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffd84d"/>
    </linearGradient>
    <linearGradient id="pkEdge" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#2a72ff"/>
      <stop offset="1" stop-color="#ff5a38"/>
    </linearGradient>
    <linearGradient id="pkFlame" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#fff7a8"/>
      <stop offset="0.5" stop-color="#ff9b32"/>
      <stop offset="1" stop-color="#ff2b4d"/>
    </linearGradient>
    <radialGradient id="pkGlow" cx="0.5" cy="0.5" r="0.65">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="0.55" stop-color="#5fa9ff" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#1a54ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="pkShadow" x="-35%" y="-80%" width="170%" height="260%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <ellipse cx="52" cy="24" rx="38" ry="16" fill="url(#pkGlow)" opacity="0.55">
    <animate attributeName="rx" values="34;42;34" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0.72;0.35" dur="1s" repeatCount="indefinite"/>
  </ellipse>

  <g filter="url(#pkShadow)">
    <g stroke="#ffd84d" stroke-width="2.5" stroke-linecap="round" opacity="0.9">
      <line x1="4" y1="10" x2="25" y2="10">
        <animate attributeName="x1" values="0;9;0" dur="0.45s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.35;1;0.35" dur="0.45s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="24" x2="28" y2="24">
        <animate attributeName="x1" values="-4;10;-4" dur="0.38s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.45;1;0.45" dur="0.38s" repeatCount="indefinite"/>
      </line>
      <line x1="4" y1="38" x2="25" y2="38">
        <animate attributeName="x1" values="0;9;0" dur="0.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.35;1;0.35" dur="0.5s" repeatCount="indefinite"/>
      </line>
    </g>

    <path d="M21 24 2 13c11 1 20 5 27 11C22 31 13 35 2 35Z" fill="url(#pkFlame)">
      <animate attributeName="d"
        values="M21 24 2 13c11 1 20 5 27 11C22 31 13 35 2 35Z;
