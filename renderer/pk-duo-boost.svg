                M21 24 2 13c11 1 20 5 27 11C22 31 13 35 2 35Z"
        dur="0.34s" repeatCount="indefinite"/>
    </path>
    <path d="M24 24 10 18c7 1 13 3 18 6C24 28 17 31 10 30Z" fill="#fff8b8" opacity="0.92">
      <animate attributeName="opacity" values="0.62;1;0.62" dur="0.28s" repeatCount="indefinite"/>
    </path>

    <path d="M20 17H58V7L91 24 58 41V31H20l10-7Z" fill="url(#pkBody)" stroke="url(#pkEdge)" stroke-width="3" stroke-linejoin="round"/>
    <path d="M35 17H58V11L82 24 58 37V31H35l9-7Z" fill="#ffffff" opacity="0.32"/>
    <path d="M52 14 64 24 52 34" fill="none" stroke="#1a54ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
      <animate attributeName="opacity" values="0.45;1;0.45" dur="0.7s" repeatCount="indefinite"/>
    </path>
    <circle cx="73" cy="24" r="3" fill="#ffffff">
      <animate attributeName="r" values="2;3.8;2" dur="0.65s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.65;1;0.65" dur="0.65s" repeatCount="indefinite"/>
