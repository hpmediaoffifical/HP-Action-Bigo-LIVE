<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 48">
  <defs>
    <linearGradient id="pkBody" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#9ddcff"/>
      <stop offset="1" stop-color="#3f7bff"/>
    </linearGradient>
    <linearGradient id="pkFlame" x1="0" x2="1">
      <stop offset="0" stop-color="#fff7a8"/>
      <stop offset="0.45" stop-color="#ff9b32"/>
      <stop offset="1" stop-color="#ff2b4d"/>
    </linearGradient>
    <radialGradient id="pkGlow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#fff" stop-opacity="0.85"/>
      <stop offset="0.6" stop-color="#5fa9ff" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#1a54ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="pkShadow" x="-40%" y="-80%" width="180%" height="260%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Pulsing aura behind rocket -->
  <ellipse cx="44" cy="24" rx="34" ry="16" fill="url(#pkGlow)" opacity="0.55">
    <animate attributeName="rx" values="30;38;30" dur="1.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0.7;0.35" dur="1.1s" repeatCount="indefinite"/>
  </ellipse>

  <g filter="url(#pkShadow)">
    <!-- Speed lines (top + bottom) -->
    <g stroke="#ffd84d" stroke-width="2.4" stroke-linecap="round" opacity="0.85">
      <line x1="2" y1="10" x2="14" y2="10">
        <animate attributeName="x1" values="0;6;0" dur="0.45s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;1;0.4" dur="0.45s" repeatCount="indefinite"/>
      </line>
      <line x1="6" y1="38" x2="18" y2="38">
        <animate attributeName="x1" values="2;10;2" dur="0.55s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;1;0.4" dur="0.55s" repeatCount="indefinite"/>
      </line>
      <line x1="10" y1="24" x2="22" y2="24">
        <animate attributeName="x1" values="4;14;4" dur="0.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="0.4s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- Animated flame trail (back) -->
    <path d="M14 24 0 14c8 1 14 4 18 10C14 30 8 34 0 34Z" fill="url(#pkFlame)">
      <animate attributeName="d"
        values="M14 24 0 14c8 1 14 4 18 10C14 30 8 34 0 34Z;
                M14 24 -4 12c10 1 16 4 22 12C14 32 6 36 -4 36Z;
                M14 24 0 14c8 1 14 4 18 10C14 30 8 34 0 34Z"
        dur="0.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.78;1" dur="0.4s" repeatCount="indefinite"/>
    </path>

    <!-- Inner flame core -->
    <path d="M16 24 6 18c5 1 9 3 12 6C16 28 10 30 6 30Z" fill="#fff8b8" opacity="0.92">
      <animate attributeName="opacity" values="0.65;1;0.65" dur="0.3s" repeatCount="indefinite"/>
    </path>

    <!-- Rocket body -->
    <path d="M9 24c8-10 19-16 35-16 12 0 23 5 31 16-8 11-19 16-31 16C28 40 17 34 9 24Z" fill="url(#pkBody)"/>

    <!-- Wing flares (top + bottom) -->
    <path d="M43 8 64 3l-7 12M43 40l21 5-7-12" fill="none" stroke="#ff5a38" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="stroke" values="#ff5a38;#ffd84d;#ff5a38" dur="0.6s" repeatCount="indefinite"/>
    </path>

    <!-- Cockpit glow ring -->
    <circle cx="45" cy="24" r="11" fill="#1a54ff" opacity="0.95">
      <animate attributeName="r" values="10;11.5;10" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="45" cy="24" r="7" fill="#5fb1ff">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="45" cy="24" r="3.5" fill="#ffffff">
      <animate attributeName="r" values="2.8;3.8;2.8" dur="0.8s" repeatCount="indefinite"/>
    </circle>

    <!-- Sparkles around rocket -->
    <g fill="#fff7a8">
      <circle cx="68" cy="14" r="1.4">
        <animate attributeName="opacity" values="0;1;0" dur="0.7s" repeatCount="indefinite"/>
        <animate attributeName="r" values="0.6;1.8;0.6" dur="0.7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="72" cy="34" r="1.2">
        <animate attributeName="opacity" values="1;0;1" dur="0.65s" repeatCount="indefinite"/>
        <animate attributeName="r" values="1.6;0.4;1.6" dur="0.65s" repeatCount="indefinite"/>
      </circle>
      <circle cx="58" cy="6" r="1">
        <animate attributeName="opacity" values="0;1;0" dur="0.9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="62" cy="42" r="1">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg>
