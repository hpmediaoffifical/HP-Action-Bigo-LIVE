<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <title>Gameplay Overlay - HP Action</title>
  <style>
    html, body { margin:0; width:100%; height:100%; background:transparent; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; }
    #wrap { display:flex; flex-wrap:wrap; column-gap:var(--item-gap,10px); row-gap:10px; padding:12px; align-items:flex-start; justify-content:center; box-sizing:border-box; }
    #wrap.grid-mode { display:grid; grid-template-columns:repeat(var(--grid-cols,10), 82px); grid-auto-rows:calc(78px + var(--icon-lift,27px)); column-gap:var(--item-gap,10px); row-gap:10px; justify-items:center; justify-content:center; }
    #wrap.vertical { grid-template-columns:1fr; flex-direction:column; flex-wrap:nowrap; align-items:flex-start; justify-content:flex-start; padding-left:0; }
    .gift { width:82px; min-height:78px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:0; padding:0 7px 8px; margin-top:var(--icon-lift,27px); border-radius:10px; background:linear-gradient(180deg,rgba(var(--card-bg-rgb,141,141,141),var(--card-opacity,.86)),rgba(80,80,80,var(--card-opacity,.86))); border:1px solid rgba(255,255,255,.12); box-shadow:0 8px 24px rgba(0,0,0,.35); color:#fff; text-shadow:0 2px 3px rgba(0,0,0,.65); transition:filter .16s,opacity .16s,transform .16s; }
    #wrap.gray-inactive .gift:not(.active) { filter:grayscale(1); opacity:.45; }
    .gift.enlarged .icon-wrap { transform:scale(var(--active-scale, 1.4)); z-index:3; }
    .gift.empty { min-height:calc(78px + var(--icon-lift,27px)); margin-top:0; padding:0 7px 8px; background:transparent; border-color:transparent; color:transparent; text-shadow:none; box-shadow:none; opacity:0; }
    .empty-plus { font-size:28px; line-height:1; }
    .empty-text { max-width:72px; min-height:14px; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .gift.label-top { flex-direction:column-reverse; }
    .gift.label-left,.gift.label-right { width:132px; min-height:68px; flex-direction:row; justify-content:center; padding:6px; }
    .gift.label-left { flex-direction:row-reverse; }
    .icon-wrap { position:relative; width:var(--icon-size,54px); height:var(--icon-size,54px); flex:0 0 auto; margin-top:calc(var(--icon-lift,27px) * -1); transition:transform .16s; transform-origin:center bottom; }
    .gift img { width:var(--icon-size,54px); height:var(--icon-size,54px); object-fit:contain; }
    .name { max-width:72px; min-height:30px; margin-top:16px; color:var(--text-color,#fff); font-family:var(--text-font,'Segoe UI',sans-serif); font-size:15px; font-weight:900; line-height:14px; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:grid; place-items:center; text-transform:none; }
    #wrap.uppercase .name { text-transform:uppercase; }
    .gift.label-left .name,.gift.label-right .name { max-width:72px; text-align:left; }
    .name.marquee { text-overflow:clip; }
    .name.marquee span { display:inline-block; min-width:100%; padding-left:100%; animation:marquee 5s linear infinite; }
    .name.wrap { white-space:normal; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; place-items:initial; }
    @keyframes marquee { from { transform:translateX(0); } to { transform:translateX(-100%); } }
    .count { position:absolute; left:50%; bottom:-5px; transform:translateX(-50%); min-width:26px; height:18px; padding:0 6px; border-radius:999px; background:#3f3f3f; color:#fff; font-weight:900; font-size:12px; line-height:18px; text-align:center; display:inline-flex; align-items:center; justify-content:center; box-shadow:0 1px 4px rgba(0,0,0,.45); }
  </style>
</head>
<body><div id="wrap"></div><script src="/gameplay-overlay.js"></script></body>
</html>
