<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <title>HP Action - OBS</title>
  <link rel="icon" type="image/png" href="/logo-hp.png" />
  <style>
    html, body { margin:0; width:100%; height:100%; background:transparent; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; }
    #wrap { display:flex; flex-wrap:wrap; column-gap:var(--item-gap,10px); row-gap:10px; padding:var(--top-safe,12px) 12px 12px; align-items:flex-start; justify-content:center; box-sizing:border-box; }
    #wrap.grid-mode { display:grid; grid-template-columns:repeat(var(--grid-cols,10), 104px); grid-auto-rows:calc(var(--icon-lift,27px) + 60px); column-gap:var(--item-gap,10px); row-gap:10px; justify-items:center; justify-content:center; }
    #wrap.vertical { grid-template-columns:1fr; flex-direction:column; flex-wrap:nowrap; align-items:flex-start; justify-content:flex-start; padding-left:0; }
    .gift { width:104px; height:60px; min-height:60px; position:relative; box-sizing:border-box; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0; padding:23px 8px 8px; margin-top:var(--icon-lift,27px); border-radius:10px; background:linear-gradient(180deg,rgba(var(--card-bg-rgb,141,141,141),var(--card-opacity,.86)),rgba(80,80,80,var(--card-opacity,.86))); border:1px solid rgba(255,255,255,.12); box-shadow:0 8px 24px rgba(0,0,0,.35); color:#fff; text-shadow:0 2px 3px rgba(0,0,0,.65); transition:filter .16s,opacity .16s,transform .16s; }
    #wrap.gray-inactive .gift:not(.active) { filter:grayscale(1); opacity:.45; }
    .gift.enlarged .icon-wrap { transform:translateX(-50%) scale(var(--active-scale, 1.4)); z-index:3; }
    .gift.empty { width:104px; min-height:calc(var(--icon-lift,27px) + 60px); margin-top:0; padding:0 8px 8px; background:transparent; border-color:transparent; color:transparent; text-shadow:none; box-shadow:none; opacity:0; }
    .empty-plus { font-size:28px; line-height:1; }
    .empty-text { max-width:72px; min-height:14px; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .gift.label-top { flex-direction:column-reverse; }
    .gift.label-left,.gift.label-right { width:116px; height:60px; min-height:60px; flex-direction:row; justify-content:center; padding:23px 8px 8px; margin-top:var(--icon-lift,27px); }
    .gift.label-left { flex-direction:row-reverse; }
    .icon-wrap { position:absolute; left:50%; top:calc((var(--icon-lift,27px) + 5px) * -1); width:var(--icon-size,54px); height:var(--icon-size,54px); flex:0 0 auto; transform:translateX(-50%); transition:transform .16s; transform-origin:center bottom; z-index:2; }
    #wrap.hide-name .icon-wrap { top:calc((var(--icon-lift,27px) - 12px) * -1); }
    .gift img { width:var(--icon-size,54px); height:var(--icon-size,54px); object-fit:contain; }
    .name { width:100%; max-width:88px; min-height:25px; margin-top:0; color:var(--text-color,#fff); font-family:var(--text-font,'Segoe UI',sans-serif); font-size:12px; font-weight:900; line-height:12px; text-align:center; white-space:normal; overflow:hidden; text-overflow:clip; display:grid; place-items:center; text-transform:none; }
    #wrap.uppercase .name { text-transform:uppercase; }
    .gift.label-left .name,.gift.label-right .name { max-width:88px; text-align:center; }
    .name.marquee { text-overflow:clip; }
    .name.marquee span { display:inline-block; min-width:100%; padding-left:100%; animation:marquee 5s linear infinite; }
    .name.wrap { white-space:normal; display:grid; place-items:center; }
    @keyframes marquee { from { transform:translateX(0); } to { transform:translateX(-100%); } }
    .count { position:absolute; left:50%; bottom:4px; transform:translateX(-50%); min-width:calc(var(--count-size,12px) + 12px); height:calc(var(--count-size,12px) + 6px); padding:0 6px; border-radius:999px; background:#3f3f3f; color:var(--count-color,#fff); font-weight:900; font-size:var(--count-size,12px); line-height:calc(var(--count-size,12px) + 6px); text-align:center; display:inline-flex; align-items:center; justify-content:center; box-shadow:0 1px 4px rgba(0,0,0,.45); z-index:6; }
    .slot-number { position:absolute; right:-4px; top:-8px; min-width:18px; color:var(--slot-number-color,#fff); font-size:19px; font-weight:900; line-height:1; text-align:center; text-shadow:0 2px 4px rgba(0,0,0,.45); z-index:4; }
  </style>
</head>
<body><div id="wrap"></div><script src="/gameplay-overlay.js"></script></body>
</html>
