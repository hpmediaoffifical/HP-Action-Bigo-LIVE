<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <title>Lịch sử quà — BIGO Action</title>
  <link rel="icon" type="image/png" href="../logo-hp.png" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { padding: 12px; min-width: 360px; }
    h1 { font-size: 14px; color: #ff8a3d; margin: 0 0 12px; display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
    .pop-stats { font-size: 11px; color: #8a8f9a; }
    .pop-stats b { color: #ffd166; }
    .pop-controls { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
    #popGifts { background: #0f1117; border-radius: 6px; padding: 6px; max-height: calc(100vh - 100px); overflow-y: auto; }
  </style>
</head>
<body>
  <h1>
    🎁 Lịch sử quà
    <span class="pop-stats">💎<b id="popDiamond">0</b> · 🎁<b id="popCount">0</b> · 👤<b id="popUsers">0</b></span>
  </h1>
  <div class="pop-controls">
    <button id="popClearAll" class="tiny danger" title="Xoá toàn bộ lịch sử quà (cả ở trang chính)">🗑 Xoá tất cả</button>
  </div>
  <div id="popGifts"></div>
  <script>
    const { ipcRenderer } = require('electron');
    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function levelTier(lv) {
      const n = parseInt(lv, 10);
      if (!n || n < 1) return 1;
      if (n <= 15) return 1;
      if (n <= 30) return 2;
      if (n <= 45) return 3;
      if (n <= 60) return 4;
      if (n <= 90) return 5;
      return 6;
    }

    // Snapshot model: app gửi full receivedGifts array → popup mirror chính xác.
    let snapshot = [];
    const stats = { diamond: 0, count: 0, users: new Set() };

    function recomputeStats() {
      stats.diamond = 0; stats.count = 0; stats.users.clear();
      for (const g of snapshot) {
        stats.count += g.count || 0;
        stats.diamond += g.diamond || 0;
        if (g.user) stats.users.add(g.user);
      }
      document.getElementById('popDiamond').textContent = stats.diamond;
      document.getElementById('popCount').textContent = stats.count;
      document.getElementById('popUsers').textContent = stats.users.size;
    }

    function renderRow(g) {
      // Avatar chỉ render khi CÓ URL — bỏ empty circle cho gọn
      const avatar = g.avatar
        ? `<img class="rcv-avatar" src="${escapeHtml(g.avatar)}" />`
        : '';
      const giftIcon = g.gift_icon
        ? `<img class="rcv-icon" src="${escapeHtml(g.gift_icon)}" />`
        : `<div class="rcv-icon-empty"></div>`;
      const lvlBadge = g.level
        ? `<span class="lvl tier-${levelTier(g.level)}" style="margin-right:4px">Lv.${g.level}</span>` : '';
      return `<div class="rcv-row ${g.avatar ? '' : 'no-avatar'}" data-gid="${escapeHtml(g.id)}">
        ${avatar}
        ${giftIcon}
        <div class="rcv-meta">
          <div class="rcv-who">${lvlBadge}${escapeHtml(g.user || '?')}</div>
          <div class="rcv-gift">${escapeHtml(g.gift_name || '?')}${g.gift_id != null ? ` <span style="color:#666">#${g.gift_id}</span>` : ''}</div>
        </div>
        <span class="rcv-count">×${g.count || 1}</span>
        <button class="rcv-del" data-del="${escapeHtml(g.id)}" title="Xoá">🗑</button>
      </div>`;
    }

    function renderAll() {
      const cont = document.getElementById('popGifts');
      if (!snapshot.length) {
        cont.innerHTML = '<div style="color:#555;text-align:center;padding:20px">Chưa có quà nào</div>';
        return;
      }
      cont.innerHTML = snapshot.map(renderRow).join('');
      cont.querySelectorAll('[data-del]').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          ipcRenderer.send('popup-gifts:remove', btn.dataset.del);
        };
      });
    }

    // Snapshot từ app → replace + render
    ipcRenderer.on('popup:gifts-snapshot', (_e, items) => {
      snapshot = Array.isArray(items) ? items : [];
      renderAll();
      recomputeStats();
    });
    // Reset
    ipcRenderer.on('popup:reset', () => {
      snapshot = [];
      renderAll();
      recomputeStats();
    });

    document.getElementById('popClearAll').onclick = () => {
      ipcRenderer.send('popup-gifts:clear-all');
    };

    renderAll();
    // Khi popup load xong, request snapshot từ app (đảm bảo sync mọi lúc)
    ipcRenderer.send('popup-gifts:request-snapshot');
  </script>
</body>
</html>
