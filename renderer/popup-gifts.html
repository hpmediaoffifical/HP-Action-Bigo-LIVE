<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <title>Lịch sử quà — BIGO Action</title>
  <link rel="icon" type="image/png" href="../logo-hp.png" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { padding: 12px; min-width: 320px; }
    h1 { font-size: 14px; color: #ff8a3d; margin: 0 0 12px; display: flex; justify-content: space-between; align-items: center; }
    .pop-stats { font-size: 11px; color: #8a8f9a; }
    .pop-stats b { color: #ffd166; }
    #popGifts { background: #0f1117; border-radius: 6px; padding: 8px; max-height: calc(100vh - 80px); overflow-y: auto; }
  </style>
</head>
<body>
  <h1>
    🎁 Lịch sử quà
    <span class="pop-stats">💎<b id="popDiamond">0</b> · 🎁<b id="popCount">0</b> · 👤<b id="popUsers">0</b></span>
  </h1>
  <div id="popGifts" class="gifts"></div>
  <script>
    const { ipcRenderer } = require('electron');

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    const stats = { diamond: 0, count: 0, users: new Set() };

    function appendEvent(ev) {
      if (ev.type !== 'gift' && ev.type !== 'gift_overlay') return;
      const div = document.createElement('div');
      div.className = 'gift-row';
      const avatar = ev.user_avatar_url
        ? `<img class="avatar" src="${escapeHtml(ev.user_avatar_url)}" />`
        : `<div class="avatar"></div>`;
      const giftIcon = ev.gift_icon
        ? `<img class="gift-icon" src="${escapeHtml(ev.gift_icon)}" />`
        : '';
      const idText = ev.gift_id != null
        ? `id <b>${ev.gift_id}</b>${ev.gift_value != null ? ` · 💎 ${ev.gift_value}` : ''}`
        : '';
      const totalCount = ev.total_count || (ev.gift_count || 1) * (ev.combo || 1);
      const totalDiamond = ev.total_diamond != null ? ev.total_diamond : (ev.gift_value != null ? totalCount * ev.gift_value : null);
      const beans = totalDiamond != null ? `<span class="beans">💎 ${totalDiamond}</span>` : '';
      const userLine = ev.level != null
        ? `<span class="lvl">Lv.${ev.level}</span><span class="who">${escapeHtml(ev.user)}</span>`
        : `<span class="who">${escapeHtml(ev.user)}</span>`;
      const cntStr = ev.type === 'gift_overlay' && ev.combo > 1
        ? `×${ev.gift_count} · combo ${ev.combo}` : `×${ev.gift_count}`;
      div.innerHTML = `${avatar}<div class="body">
        <div class="row1">${userLine}</div>
        <div class="row2">${giftIcon}<span class="what">${escapeHtml(ev.gift_name || '?')}</span><span class="gift-id">${idText}</span></div>
      </div><div class="right"><span class="cnt">${cntStr}</span>${beans}</div>`;
      document.getElementById('popGifts').prepend(div);
      while (document.getElementById('popGifts').children.length > 200) {
        document.getElementById('popGifts').lastChild.remove();
      }
      // stats
      if (ev.type === 'gift') {
        stats.count += (ev.gift_count || 1) * (ev.combo || 1);
        stats.diamond += ev.total_diamond || 0;
        if (ev.user) stats.users.add(ev.user);
        document.getElementById('popDiamond').textContent = stats.diamond;
        document.getElementById('popCount').textContent = stats.count;
        document.getElementById('popUsers').textContent = stats.users.size;
      }
    }

    ipcRenderer.on('popup:event', (_e, ev) => appendEvent(ev));
    ipcRenderer.on('popup:reset', () => {
      document.getElementById('popGifts').innerHTML = '';
      stats.diamond = 0; stats.count = 0; stats.users.clear();
      document.getElementById('popDiamond').textContent = '0';
      document.getElementById('popCount').textContent = '0';
      document.getElementById('popUsers').textContent = '0';
    });
  </script>
</body>
</html>
