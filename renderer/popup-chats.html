<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <title>TƯƠNG TÁC — HP Action - BIGO LIVE</title>
  <link rel="icon" type="image/png" href="../logo-hp.png" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { padding: 12px; min-width: 360px; }
    h1 { font-size: 14px; color: #ff8a3d; margin: 0 0 12px; display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
    .pop-stats { font-size: 11px; color: #8a8f9a; }
    .pop-controls { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; font-size: 11px; color: #8a8f9a; }
    .pop-settings { display:none; gap:8px; margin:-2px 0 8px; padding:7px 8px; background:#0f1117; border:1px solid #262a35; border-radius:8px; align-items:center; }
    .pop-settings.open { display:flex; }
    .pop-settings label { min-width:0; flex:1 0 150px; display:grid; grid-template-columns:auto auto 1fr; align-items:center; gap:5px; color:#8a8f9a; font-size:11px; }
    #popChats {
      background: #0f1117; border-radius: 6px; padding: 6px;
      max-height: calc(100vh - 100px); overflow-y: auto;
      font-size: var(--chat-font, 13px);
    }
    .chat-row { padding: 5px 8px; border-bottom: 1px solid #1c1f28; display: flex; gap: 6px; align-items: baseline; }
  </style>
</head>
<body>
  <h1>
    💬 TƯƠNG TÁC
    <span class="pop-stats" id="popChatCount">0 dòng</span>
  </h1>
  <div class="pop-controls">
    <button id="popChatSettingsBtn" class="tiny" title="Cài đặt kích thước popup">⚙</button>
    <button id="popChatClear" class="tiny danger" title="Xoá hiển thị">🗑 Xoá</button>
  </div>
  <div id="popChatSettings" class="pop-settings">
    <label>Cỡ chữ <span id="popChatFontVal" style="color:#ffd166">13</span>px
      <input type="range" id="popChatFont" min="11" max="100" value="13" />
    </label>
  </div>
  <div id="popChats"></div>
  <script>
    const { ipcRenderer } = require('electron');
    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function levelTier(lv) {
      const n = parseInt(lv, 10);
      if (!n || n < 1) return 1;
      if (n <= 15) return 1;
      if (n <= 30) return 2;
      if (n <= 45) return 3;
      if (n <= 60) return 4;
      if (n <= 90) return 5;
      return 6;
    }

    const cont = document.getElementById('popChats');
    const fontInput = document.getElementById('popChatFont');
    const fontVal = document.getElementById('popChatFontVal');
    const countEl = document.getElementById('popChatCount');

    function applyFont() {
      const f = fontInput.value;
      cont.style.setProperty('--chat-font', f + 'px');
      fontVal.textContent = f;
      localStorage.setItem('popupChatFont', f);
    }
    try {
      const savedFont = localStorage.getItem('popupChatFont');
      if (savedFont) fontInput.value = savedFont;
    } catch {}
    fontInput.addEventListener('input', applyFont);
    applyFont();
    document.getElementById('popChatSettingsBtn').onclick = () => document.getElementById('popChatSettings').classList.toggle('open');

    let totalRows = 0;

    function appendChat(ev) {
      // ev = { user, level, content, user_avatar_url }
      const div = document.createElement('div');
      div.className = 'chat-row';
      const avUrl = ev.user_avatar_url || '';
      const av = avUrl ? `<img class="avatar" src="${escapeHtml(avUrl)}" loading="lazy" style="width:20px;height:20px" />` : '';
      const tier = levelTier(ev.level);
      const lvlText = ev.level ? `Lv.${ev.level}` : 'Lv.?';
      div.innerHTML = `${av}<span class="lvl tier-${tier}">${lvlText}</span><span class="who">${escapeHtml(ev.user)}</span><span class="what">${escapeHtml(ev.content)}</span>`;
      cont.appendChild(div);
      while (cont.children.length > 500) cont.firstChild.remove();
      cont.scrollTop = cont.scrollHeight;
      totalRows++;
      countEl.textContent = `${totalRows} dòng`;
    }

    ipcRenderer.on('popup-chats:event', (_e, ev) => appendChat(ev));
    ipcRenderer.on('popup-chats:reset', () => {
      cont.innerHTML = '';
      totalRows = 0;
      countEl.textContent = '0 dòng';
    });
    // Snapshot từ app → render full history khi popup vừa mở.
    ipcRenderer.on('popup-chats:snapshot', (_e, items) => {
      cont.innerHTML = '';
      totalRows = 0;
      if (Array.isArray(items)) {
        for (const ev of items) appendChat(ev);
      }
    });
    document.getElementById('popChatClear').onclick = () => {
      cont.innerHTML = '';
      totalRows = 0;
      countEl.textContent = '0 dòng';
    };
    // Khi popup vừa load xong → request snapshot từ app (history các chat đã đến).
    ipcRenderer.send('popup-chats:request-snapshot');
  </script>
</body>
</html>
